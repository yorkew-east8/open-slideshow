version: '3'

vars:
  IMAGE: open-slideshow:latest
  COMPOSE: docker compose

tasks:
  # 构建：lint/test 已内置进 build stage，随构建自动重跑
  build:
    desc: 构建镜像（含 lint/test 质量门禁，Docker 内）
    cmds:
      - docker build -t {{.IMAGE}} .

  # 启动 playground
  playground:up:
    desc: 构建并启动容器（首页 :8080，播放 :3030）
    cmds:
      - '{{.COMPOSE}} up --build'

  playground:up-detached:
    desc: 后台启动 playground
    cmds:
      - '{{.COMPOSE}} up -d --build'

  playground:down:
    desc: 停止 playground 容器
    cmds:
      - '{{.COMPOSE}} down'

  logs:
    desc: 查看 playground 日志
    cmds:
      - '{{.COMPOSE}} logs -f'

  # e2e：用 playwright 镜像跑（需先 playground:up-detached）
  e2e:
    desc: 用 playwright 镜像跑 e2e 测试（需先 playground:up-detached）
    deps: [playground:up-detached]
    cmds:
      - docker build -t os-e2e:latest tests/e2e
      - >
        docker run --rm -e TARGET_HOST=host.docker.internal
        --entrypoint sh os-e2e:latest
        -c "npx playwright test --reporter=list"
